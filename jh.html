<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉慶君遊台灣 - 御前爭霸 | 文化紙牌桌游</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #1a0f0f; /* 深邃的暗红色背景 */
            color: #f3e8d2;
        }
        
        /* 影片背景的渐变遮罩 */
        .video-overlay {
            background: linear-gradient(to bottom, rgba(26, 15, 15, 0.2) 0%, rgba(26, 15, 15, 1) 100%);
        }

        /* 皇家古典边框效果 */
        .imperial-border {
            border: 2px solid #b48e4b;
            box-shadow: 0 0 20px rgba(180, 142, 75, 0.3);
        }

        /* 标签渐变背景 */
        .tag-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%);
            color: #4a0000;
        }

        /* 动画效果 */
        .fade-in-up {
            animation: fadeInUp 1.2s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden selection:bg-yellow-600 selection:text-white">

    <!-- 导航栏 -->
    <nav class="fixed w-full z-50 transition-all duration-300 bg-black/80 backdrop-blur-sm border-b border-yellow-900/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <!-- 简易Logo -->
                    <div class="w-10 h-10 rounded-full bg-yellow-600 flex items-center justify-center text-red-950 font-bold text-xl imperial-border">
                        嘉
                    </div>
                    <span class="font-bold text-2xl tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600">
                        嘉慶君遊台灣
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主视觉影片区 (Hero Section) -->
    <section id="video-section" class="relative min-h-screen flex items-center justify-center pt-20">
        <!-- 装饰性背景光晕 -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-red-900/30 rounded-full blur-3xl"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-yellow-900/20 rounded-full blur-3xl"></div>
        </div>

        <div class="relative z-10 w-full max-w-6xl mx-auto px-4 py-12 flex flex-col items-center">
            
            <div class="text-center mb-10 fade-in-up" style="animation-delay: 0.2s;">
                <h2 class="text-yellow-500 font-bold tracking-[0.3em] mb-3 text-sm md:text-base">文化紙牌桌遊</h2>
                <h1 class="text-4xl md:text-6xl lg:text-7xl font-black text-white mb-6 drop-shadow-lg">
                    嘉慶君遊台灣 <br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-red-600 text-3xl md:text-5xl lg:text-6xl mt-4 inline-block tracking-widest">御前爭霸</span>
                </h1>
                <p class="text-gray-300 max-w-2xl mx-auto text-lg leading-relaxed">
                    嘉慶君微服巡台，遭遇百順樓激戰、貪官陷害。<br>
                    你能否化身御前侍衛，力挽狂瀾？
                </p>
            </div>

            <!-- 影片播放器 -->
            <div class="w-full relative rounded-2xl overflow-hidden imperial-border shadow-2xl shadow-red-900/50 fade-in-up bg-black" style="animation-delay: 0.5s;">
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10" id="video-placeholder">
                    <p class="text-yellow-600/50 text-sm">影片载入中...</p>
                </div>
                <!-- 嵌入影片档案 -->
                <video 
                    id="main-video"
                    class="w-full relative z-20 aspect-video object-cover" 
                    controls 
                    poster="poster.jpg"
                    preload="metadata">
                    <source src="trailer.mp4" type="video/mp4">
                    您的浏览器不支持 HTML5 影片播放。
                </video>
            </div>
            
        </div>
    </section>

    <!-- 游戏介绍与海报区 (About Section) -->
    <section id="about-section" class="relative py-24 bg-gradient-to-b from-[#1a0f0f] to-[#2a0808]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <div class="flex flex-col lg:flex-row items-center gap-16">
                
                <!-- 左侧：海报图片 -->
                <div class="w-full lg:w-1/2 relative group fade-in-up">
                    <div class="absolute -inset-2 bg-gradient-to-r from-yellow-600 to-red-600 rounded-xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                    <!-- 嵌入图片档案 -->
                    <img src="poster.jpg" alt="嘉庆君游台湾御前争霸桌游海报" class="relative rounded-xl shadow-2xl imperial-border w-full object-cover transform transition duration-500 hover:scale-[1.02]">
                </div>

                <!-- 右侧：文字介绍 -->
                <div class="w-full lg:w-1/2 fade-in-up" style="animation-delay: 0.3s;">
                    <h2 class="text-3xl md:text-5xl font-bold mb-6 text-white leading-tight">
                        微服巡台，<br>
                        你能否<span class="text-yellow-500">力挽狂澜</span>？
                    </h2>
                    
                    <p class="text-gray-300 text-lg mb-8 leading-relaxed">
                        嘉庆君微服巡台，遭遇百顺楼激战、贪官陷害。在波谲云诡的局势中，不仅要面对外部的刀光剑影，更要揣测人心。这不只是一场游戏，更是一次深入台湾在地文化的沉浸式冒险。
                    </p>

                    <!-- 核心特色标签 -->
                    <div class="grid grid-cols-2 gap-4 mb-10">
                        <div class="tag-gradient px-6 py-4 rounded-lg shadow-lg transform transition hover:-translate-y-1 text-center font-bold text-lg">
                            心理博弈
                        </div>
                        <div class="tag-gradient px-6 py-4 rounded-lg shadow-lg transform transition hover:-translate-y-1 text-center font-bold text-lg">
                            合作博弈
                        </div>
                        <div class="tag-gradient px-6 py-4 rounded-lg shadow-lg transform transition hover:-translate-y-1 text-center font-bold text-lg">
                            在地文化
                        </div>
                        <div class="tag-gradient px-6 py-4 rounded-lg shadow-lg transform transition hover:-translate-y-1 text-center font-bold text-lg">
                            轻松上手
                        </div>
                    </div>

                    <a href="https://tonkhsueh777-oss.github.io/hcc/" target="_blank" rel="noopener noreferrer" class="w-full sm:w-auto inline-flex bg-gradient-to-r from-red-800 to-red-900 hover:from-red-700 hover:to-red-800 text-yellow-400 px-10 py-4 rounded-lg font-bold text-xl imperial-border transition-all shadow-[0_0_15px_rgba(180,142,75,0.4)] items-center justify-center gap-3 cursor-pointer">
                        <span>支持募资 / 预购桌游</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </a>
                </div>
            </div>

        </div>
    </section>

    <!-- 页尾 -->
    <footer class="bg-black py-10 border-t border-red-900/50">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h3 class="text-2xl font-bold text-yellow-600 mb-4 tracking-widest">嘉慶君遊台灣</h3>
            <p class="text-gray-500 text-sm mb-6">薛颖钟动画监制 · 红薏米动画团队制作</p>
            <div class="w-24 h-[1px] bg-yellow-800/50 mx-auto mb-6"></div>
            <p class="text-gray-600 text-xs">
                &copy; 2026 文化纸牌桌游. All rights reserved.<br>
                影片与图片版权归原制作团队所有。
            </p>
        </div>
    </footer>

    <script>
        // 简单的影片载入处理
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('main-video');
            const placeholder = document.getElementById('video-placeholder');

            video.addEventListener('loadeddata', () => {
                placeholder.style.display = 'none';
            });
        });
    </script>
</body>
</html>
